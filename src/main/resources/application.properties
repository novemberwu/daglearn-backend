spring.application.name=daglearn

# Neo4j Configuration
spring.neo4j.uri=${NEO4J_URI:bolt://localhost:7687}
spring.neo4j.authentication.username=${NEO4J_USERNAME:neo4j}
spring.neo4j.authentication.password=${NEO4J_PASSWORD:poker-person-mission-freddie-quality-8103}

# Security, OAuth2, and CORS Configuration
app.security.oauth2.client-id=${OAUTH2_CLIENT_ID:next-client}
app.security.oauth2.client-secret=${OAUTH2_CLIENT_SECRET:secret}
app.security.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:3000/api/auth/callback/next-learn}
app.security.oauth2.post-logout-redirect-uri=${OAUTH2_POST_LOGOUT_REDIRECT_URI:http://localhost:3000/}
app.security.jwt.issuer=${JWT_ISSUER:http://localhost:8080}
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# JWT/JWK Keys Configuration
app.security.jwt.private-key-pem=${JWT_PRIVATE_KEY_PEM:}
app.security.jwt.public-key-pem=${JWT_PUBLIC_KEY_PEM:}
app.security.jwt.key-id=${JWT_KEY_ID:daglearn-jwt-key}

# Database Seeding Settings
app.database.force-reseed=${FORCE_RESEED:false}

# Optional: Output Cypher queries for debugging
spring.data.neo4j.repositories.enabled=true
logging.level.org.springframework.data.neo4j=DEBUG
